<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Modern Under Work | Please Wait</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* subtle anti-select, adds friction */
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffffff 0%, #e6e9f0 45%, #d0d5e0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* animated gradient overlay (modern subtle moving light) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.03) 0%, rgba(255,255,255,0.4) 80%);
            pointer-events: none;
            z-index: 0;
            animation: slowShift 18s infinite alternate;
        }

        @keyframes slowShift {
            0% { opacity: 0.3; transform: scale(1);}
            100% { opacity: 0.8; transform: scale(1.2);}
        }

        /* main container — modern glassmorphism with black/white gradient border */
        .hero {
            text-align: center;
            z-index: 2;
            backdrop-filter: blur(0px);
            background: rgba(255, 255, 255, 0.96);
            padding: 2.2rem 2rem 2.5rem;
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.02), inset 0 1px 1px rgba(255,255,255,0.8);
            width: 90%;
            max-width: 700px;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.08);
        }

        /* logo area */
        .logo-container {
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 85px;
        }

        .logo-img {
            max-width: 110px;
            max-height: 110px;
            width: auto;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
            transition: transform 0.2s ease;
        }

        .logo-img:hover {
            transform: scale(1.02);
        }

        .logo-placeholder {
            font-size: 2.8rem;
            font-weight: 300;
            color: #bbb;
            letter-spacing: 2px;
        }

        /* animated title — modern black & white gradient */
        .status-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1a1f2e 0%, #2c2f3a 40%, #000000 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerBW 6s ease infinite, floatText 3s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }

        @keyframes shimmerBW {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatText {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .sub-message {
            font-size: 1.3rem;
            color: #3b3f4c;
            margin: 0.5rem 0 1rem;
            font-weight: 460;
            letter-spacing: 0.3px;
            text-shadow: none;
            background: rgba(0,0,0,0.02);
            display: inline-block;
            padding: 0 1rem;
        }

        /* modern loader with black/white spinner */
        .loader-wrapper {
            margin: 2.2rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .spinner {
            width: 54px;
            height: 54px;
            border: 4px solid #e2e4e8;
            border-top: 4px solid #1e1f28;
            border-right: 4px solid #3a3e4a;
            border-radius: 50%;
            animation: spin 1.1s infinite cubic-bezier(0.55, 0.15, 0.45, 0.85);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pulse-dots {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .pulse-dots span {
            width: 12px;
            height: 12px;
            background: #2b2f3a;
            border-radius: 50%;
            display: inline-block;
            animation: bounceModern 0.8s infinite alternate;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .pulse-dots span:nth-child(2) { animation-delay: 0.2s; background: #5a6072; }
        .pulse-dots span:nth-child(3) { animation-delay: 0.4s; background: #000000; }

        @keyframes bounceModern {
            0% { transform: translateY(0px) scale(0.9); opacity: 0.5; }
            100% { transform: translateY(-16px) scale(1.1); opacity: 1; }
        }

        /* progress bar — sleek dark/light */
        .progress-track {
            width: 75%;
            margin: 1.5rem auto;
            height: 6px;
            background: #eef2f7;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
        }

        .progress-fill {
            width: 68%;
            height: 100%;
            background: linear-gradient(90deg, #2c2f3a, #000000, #3a3f50);
            border-radius: 10px;
            animation: progressMove 2.6s infinite ease-in-out;
        }

        @keyframes progressMove {
            0% { width: 12%; }
            50% { width: 86%; }
            100% { width: 12%; }
        }

        .tech-note {
            margin-top: 1.6rem;
            font-size: 0.75rem;
            color: #7a7f8c;
            font-family: 'Fira Mono', monospace;
            letter-spacing: 0.4px;
            border-top: 1px solid #eef2f8;
            padding-top: 1rem;
            display: inline-block;
        }

        /* hover glitch effect (stylish only) */
        .hero:hover .status-title {
            animation: glitchSoft 0.25s infinite;
        }

        @keyframes glitchSoft {
            0% { text-shadow: -1px 0 rgba(0,0,0,0.2), 1px 0 rgba(255,255,255,0.5); }
            50% { text-shadow: 1px 0 rgba(0,0,0,0.2), -1px 0 rgba(255,255,255,0.5); }
            100% { text-shadow: -0.5px 0 rgba(0,0,0,0.1), 0.5px 0 rgba(255,255,255,0.5); }
        }

        /* --- MODAL OVERLAY (POPUP) modern white/black with red accent--- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 18, 0.92);
            backdrop-filter: blur(12px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.25s ease;
            font-family: 'Inter', system-ui;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.25s ease;
        }

        .popup-card {
            background: #ffffff;
            max-width: 450px;
            width: 85%;
            padding: 2rem 1.8rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid #ff5c7c;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255,255,255,0.2);
            transform: scale(0.94);
            animation: modalPopModern 0.32s cubic-bezier(0.2, 0.9, 0.4, 1.2) forwards;
        }

        @keyframes modalPopModern {
            from { transform: scale(0.88); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .popup-card h3 {
            font-size: 1.9rem;
            color: #dc2f4a;
            margin-bottom: 1rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .popup-card p {
            color: #1e232f;
            font-size: 1.2rem;
            margin: 1rem 0;
            line-height: 1.4;
            font-weight: 500;
        }

        .sorry-btn {
            background: #1f2937;
            border: none;
            padding: 12px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.2s ease;
            font-family: inherit;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .sorry-btn:hover {
            background: #dc2f4a;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(220, 47, 74, 0.3);
        }

        body.modal-open {
            overflow: hidden;
        }

        /* responsive */
        @media (max-width: 540px) {
            .status-title { font-size: 2.2rem; }
            .sub-message { font-size: 1.1rem; }
            .hero { padding: 1.5rem; }
            .logo-img { max-width: 75px; max-height: 75px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <!-- Logo container: tries to load image.png from same directory -->
    <div class="logo-container" id="logoContainer">
        <img id="mainLogo" class="logo-img" src="image.png" alt="Company Logo" onerror="handleLogoError()">
    </div>
    
    <div class="status-title">⚠ UNDER WORK ⚠</div>
    <div class="sub-message">PLEASE WAIT..</div>
    
    <div class="loader-wrapper">
        <div class="spinner"></div>
        <div class="pulse-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="progress-track">
        <div class="progress-fill"></div>
    </div>

    <div class="tech-note">
        ✦ system calibration in progress ✦ <br>
        ✦ next-gen experience loading ✦
    </div>
</div>

<!-- Persistent popup modal -->
<div id="devtoolsModal" class="modal-overlay">
    <div class="popup-card">
        <h3>⚠ SECURITY ALERT ⚠</h3>
        <p>🚨 caught you trying to steal source!<br> now say sorry.</p>
        <button id="sorryButton" class="sorry-btn">💔 I'M SORRY 💔</button>
    </div>
</div>

<script>
    (function() {
        // ======================== LOGO HANDLER ========================
        // Searches for image.png in same directory. If fails, hides logo or shows clean placeholder text (modern minimal)
        function handleLogoError() {
            const logoImg = document.getElementById('mainLogo');
            const container = document.getElementById('logoContainer');
            if (logoImg) {
                // remove broken image, create a minimal vector placeholder (no external)
                logoImg.style.display = 'none';
                const placeholderSpan = document.createElement('div');
                placeholderSpan.className = 'logo-placeholder';
                placeholderSpan.innerHTML = '◈';
                placeholderSpan.style.fontSize = '3rem';
                placeholderSpan.style.fontWeight = '300';
                placeholderSpan.style.opacity = '0.4';
                placeholderSpan.style.letterSpacing = '2px';
                container.appendChild(placeholderSpan);
            }
        }
        // expose globally so onerror works
        window.handleLogoError = handleLogoError;
        
        // If image.png loads successfully, just keep visible; additional check for empty src? fine.
        const logoCheck = document.getElementById('mainLogo');
        if (logoCheck.complete && logoCheck.naturalWidth === 0) {
            handleLogoError();
        }
        
        // ======================== PERSISTENT LOCK & POPUP LOGIC (anti-dev tools) ========================
        const STORAGE_KEY = 'devtoolsAttemptLock';
        const modal = document.getElementById('devtoolsModal');
        const sorryBtn = document.getElementById('sorryButton');
        
        let isModalActive = false;
        let detectionCooldown = false;
        
        function showPersistentPopup() {
            if (isModalActive) return;
            localStorage.setItem(STORAGE_KEY, 'true');
            modal.classList.add('active');
            document.body.classList.add('modal-open');
            isModalActive = true;
        }
        
        function apologizeAndClear() {
            localStorage.removeItem(STORAGE_KEY);
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
            isModalActive = false;
            detectionCooldown = true;
            setTimeout(() => {
                detectionCooldown = false;
            }, 1500);
        }
        
        function checkPersistentLock() {
            if (localStorage.getItem(STORAGE_KEY) === 'true') {
                if (!isModalActive) {
                    modal.classList.add('active');
                    document.body.classList.add('modal-open');
                    isModalActive = true;
                }
            }
        }
        
        function triggerDevtoolsCaught() {
            if (isModalActive) return;
            if (detectionCooldown) return;
            showPersistentPopup();
        }
        
        // ========= BLOCK SHORTCUTS (F12, CTRL+SHIFT+I, etc) =========
        function blockShortcutsAndPopup(e) {
            const isF12 = (e.key === 'F12');
            const isCtrlShiftI = (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i'));
            const isCtrlShiftJ = (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j'));
            const isCtrlShiftC = (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c'));
            const isCtrlU = (e.ctrlKey && (e.key === 'U' || e.key === 'u'));
            const isCtrlS = (e.ctrlKey && (e.key === 'S' || e.key === 's'));
            const isCtrlP = (e.ctrlKey && (e.key === 'P' || e.key === 'p'));
            
            if (isF12 || isCtrlShiftI || isCtrlShiftJ || isCtrlShiftC || isCtrlU || isCtrlS || isCtrlP) {
                e.preventDefault();
                e.stopPropagation();
                triggerDevtoolsCaught();
                return false;
            }
        }
        
        function blockContextMenu(e) {
            e.preventDefault();
            triggerDevtoolsCaught();
            return false;
        }
        
        function blockDragAndDrop(e) {
            e.preventDefault();
        }
        
        // ========= DETECT DEVTOOLS OPEN (dimension heuristic) =========
        let devtoolsDetectInterval = null;
        
        function isDevToolsOpen() {
            const widthDiff = window.outerWidth - window.innerWidth;
            const heightDiff = window.outerHeight - window.innerHeight;
            return (widthDiff > 140) || (heightDiff > 140);
        }
        
        function watchDevtools() {
            if (devtoolsDetectInterval) clearInterval(devtoolsDetectInterval);
            devtoolsDetectInterval = setInterval(() => {
                if (!isModalActive && !detectionCooldown) {
                    if (isDevToolsOpen()) {
                        triggerDevtoolsCaught();
                    }
                }
            }, 1000);
        }
        
        let resizeTimer;
        window.addEventListener('resize', function() {
            if (resizeTimer) clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (!isModalActive && !detectionCooldown) {
                    if (isDevToolsOpen()) {
                        triggerDevtoolsCaught();
                    }
                }
            }, 280);
        });
        
        // Attach event listeners
        window.addEventListener('keydown', blockShortcutsAndPopup);
        window.addEventListener('contextmenu', blockContextMenu);
        window.addEventListener('dragstart', blockDragAndDrop);
        window.addEventListener('keyup', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                triggerDevtoolsCaught();
                return false;
            }
        });
        
        document.addEventListener('keydown', blockShortcutsAndPopup, true);
        
        // handle beforeprint / save attempts
        window.addEventListener('beforeprint', (e) => {
            triggerDevtoolsCaught();
            e.preventDefault();
        });
        
        // ========= PERSISTENT LOCK ON LOAD =========
        checkPersistentLock();
        
        sorryBtn.addEventListener('click', () => {
            apologizeAndClear();
        });
        
        // Prevent closing modal via escape key (must say sorry)
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && isModalActive) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }
        });
        
        // block click on overlay from closing
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                e.stopPropagation();
            }
        });
        
        // start devtools watcher after load
        window.addEventListener('load', () => {
            watchDevtools();
            // extra check for image.png if not loaded earlier (but handleLogoError already)
            if (logoCheck && logoCheck.complete && logoCheck.naturalWidth === 0) {
                handleLogoError();
            }
        });
        
        // if flag already active before load, ensure it's present
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                if (localStorage.getItem(STORAGE_KEY) === 'true' && !isModalActive) {
                    showPersistentPopup();
                }
            });
        } else {
            if (localStorage.getItem(STORAGE_KEY) === 'true' && !isModalActive) {
                showPersistentPopup();
            }
        }
        
        // Anti-console tampering warning but not intrusive
        console.log("%c🔒 PROTECTED ZONE 🔒", "color: #dc2f4a; font-size: 14px; font-weight: bold;");
        console.log("%cAny inspection attempt will lock the page permanently until apology.", "color: #3b3f4c;");
    })();
</script>
</body>
</html>
